<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أدخل رمز التحقق</title>
    <style>
        /* إعدادات الصفحة الأساسية */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: #fff; height: 100vh; display: flex; justify-content: center; }
        
        /* الحاوية الرئيسية */
        .container { 
            width: 100%; max-width: 450px; padding: 40px 25px; 
            display: flex; flex-direction: column; align-items: center; position: relative;
        }
        
        /* الأيقونة في الأعلى */
        .icon-container { margin-top: 60px; margin-bottom: 30px; }
        .sparkle-icon { width: 80px; height: auto; display: block; } 

        /* النصوص */
        h1 { font-size: 22px; margin-bottom: 10px; color: #000; }
        p { color: #555; margin-bottom: 40px; font-size: 14px; }
        
        /* مربعات الـ OTP */
        .otp-inputs { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; }
        .otp-box { 
            width: 50px; height: 60px; border: none; border-radius: 12px; 
            background-color: #f5f5f5; text-align: center; font-size: 24px; 
            outline: none; transition: 0.3s;
        }
        .otp-box:focus { border: 2px solid #FFD700; background-color: #fff; }
        
        /* التذييل (الرابط في الأسفل) */
        .bottom-section { 
            margin-top: auto; width: 100%; text-align: center; padding-bottom: 40px; 
        }
        .resend-text { color: #888; font-size: 14px; margin-bottom: 10px; }
        
        #resendLink {
            color: #ccc; font-weight: bold; text-decoration: none;
            pointer-events: none; transition: 0.3s;
        }
        #resendLink.available { color: #000; pointer-events: auto; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <div class="icon-container">
        <img src="barq-icon.png" alt="شعار برق" class="sparkle-icon">
    </div>

    <h1>أدخل رمز التحقق</h1>
    <p>تم الإرسال إلى <span id="displayPhone"></span></p>

    <div class="otp-inputs">
        <input type="number" class="otp-box" maxlength="1">
        <input type="number" class="otp-box" maxlength="1">
        <input type="number" class="otp-box" maxlength="1">
        <input type="number" class="otp-box" maxlength="1">
        <input type="number" class="otp-box" maxlength="1">
        <input type="number" class="otp-box" maxlength="1">
    </div>

    <div class="bottom-section">
        <div class="resend-text">لم تحصل على رمز؟</div>
        <a href="javascript:void(0)" id="resendLink">إعادة إرسال الرمز في <span id="timer">60</span></a>
    </div>
</div>

<script>
    // 1. عرض الرقم المخزن من الصفحة السابقة
    const phone = localStorage.getItem('userPhone');
    if(phone) { document.getElementById('displayPhone').innerText = phone; }

    // 2. منطق العداد التنازلي
    let timeLeft = 60;
    const timerElement = document.getElementById('timer');
    const resendLink = document.getElementById('resendLink');

    const countdown = setInterval(() => {
        timeLeft--;
        timerElement.innerText = timeLeft;
        if (timeLeft <= 0) {
            clearInterval(countdown);
            resendLink.innerHTML = "إعادة إرسال الرمز الآن";
            resendLink.classList.add('available');
        }
    }, 1000);

    // 3. التنقل التلقائي بين المربعات
    const inputs = document.querySelectorAll('.otp-box');
    inputs.forEach((input, index) => {
        input.addEventListener('input', (e) => {
            if (e.target.value.length > 1) e.target.value = e.target.value.slice(0, 1);
            if (input.value.length === 1 && index < inputs.length - 1) inputs[index + 1].focus();
        });
        input.addEventListener('keydown', (e) => {
            if (e.key === 'Backspace' && input.value === '' && index > 0) inputs[index - 1].focus();
        });
    });
</script>

</body>
</html>
